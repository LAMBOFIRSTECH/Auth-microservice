######## VARIABLES ########
variables:
  GIT_DEPTH: "0" # Pour récupérer toutes les branches
  DOTNET_CLI_TELEMETRY_OPTOUT: "1" # Désactiver la télémétrie .NET
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: "true" # Réduire les étapes initiales
  DOTNET_NOLOGO: "true" # Supprimer le logo CLI .NET des logs
  BUILD_CONFIGURATION: "Release" # Configuration utilisée pour la compilation
  COVERAGE_REPORT_PATH: "TestAuthentications/coverage.opencover.xml"
  SONAR_HOST_URL: "https://your-sonarqube-url" # URL de SonarQube
  SONAR_USER_TOKEN: "${SONAR_USER_TOKEN}" # Jeton pour SonarQube
  DOCKER_IMAGE_TAG: "${CI_REGISTRY_IMAGE}:${CI_COMMIT_REF_SLUG}" # Tag de l'image Docker
  #toto: $(ls *.sln | sed -E 's/\.sln$//')

default:
  tags:
    - gitlab-lamboft-docker-runner

######## CACHE ########
cache:
  key: ${CI_COMMIT_REF_SLUG}
  paths:
    - ~/.nuget/packages/ # Cache des dépendances NuGet
######## BEFORE_SCRIPT ########
# before_script:
#   - echo "Nettoyage global avant tous les stages"
#   - chmod -R u+w Authentifications/bin || true
#   - chmod -R u+w Authentifications/obj || true
#   - chmod -R u+w TestAuthentications/bin || true
#   - chmod -R u+w TestAuthentications/obj || true
#   - rm -rf Authentifications/bin || true
#   - rm -rf Authentifications/obj || true
#   - rm -rf TestAuthentications/bin || true
#   - rm -rf TestAuthentications/obj || true
#   - echo "Validation :Vérification que les fichiers problématiques ont été nettoyés"
#   - ls -la Authentifications/bin || true
#   - ls -la TestAuthentications/bin || true
######## STAGES ########
stages:
  - restore
  - build
  - test
  - sonarqube-check_analysis_report
  - deploy

######## RESTORE ########
restore:
  stage: restore
  script:
    - echo "Nettoyage des caches locaux NuGet"
    - dotnet nuget locals all --clear
    - echo "Restauration des dépendances .NET"
    - src=$(ls *.sln | sed -E 's/\.sln$//')
    - dotnet restore $src/$src.csproj
    - dotnet restore TestAuthentications/TestAuthentications.csproj
  artifacts:
    paths:
      - ~/.nuget/packages/ # Sauvegarde le cache des dépendances
    expire_in: 1 day

######## BUILD ########
build:
  stage: build
  script:
    - echo "Compilation du projet principal"
    - dotnet restore Authentifications/Authentifications.csproj
    - dotnet restore TestAuthentications/TestAuthentications.csproj
  dependencies:
    - restore # Dépend de la restauration

######## TEST ########
test:
  stage: test
  script:
    - echo "Exécution des tests unitaires avec collecte de couverture"
    - |
      dotnet test TestAuthentications/TestAuthentications.csproj \
        --configuration $BUILD_CONFIGURATION \
        --no-restore \
        --collect:"XPlat Code Coverage" \
        /p:CollectCoverage=true \
        /p:CoverletOutputFormat=opencover \
        /p:CoverletOutput=${COVERAGE_REPORT_PATH}

  dependencies:
    - build # Dépend de la compilation
  artifacts:
    when: always
    paths:
      - ${COVERAGE_REPORT_PATH}
    reports:
      junit: ${COVERAGE_REPORT_PATH}

######## SONARQUBE ########
sonarqube-check_analysis_report:
  stage: sonarqube-check_analysis_report
  tags:
    - gitlab-lamboft-shell-runner
  variables:
    RUNNER_TAG: "development"
    allow_failure: false
  script:
    - chmod -R u+w Authentifications/bin || true
    - chmod -R u+w Authentifications/obj || true
    - chmod -R u+w TestAuthentications/bin || true
    - chmod -R u+w TestAuthentications/obj || true
    - rm -rf Authentifications/bin || true
    - rm -rf Authentifications/obj || true
    - rm -rf TestAuthentications/bin || true
    - rm -rf TestAuthentications/obj || true
    - echo "Lancement de l'analyse SonarQube"
    - dotnet tool install --global dotnet-sonarscanner --version 5.11.0
    - export PATH="$PATH:/root/.dotnet/tools"
    - chmod +x sonar_check.sh; ./sonar_check.sh
    - chmod +x sonar_report.sh; ./sonar_report.sh
  dependencies:
    - test # Dépend des tests et de la couverture

######## DEPLOY ENV DEV ########
Env_dev:
  stage: deploy
  tags:
    - gitlab-lamboft-shell-runner
  rules:
    - if: '$CI_COMMIT_BRANCH == "develop"'
  variables:
    RUNNER_TAG: "development"
    allow_failure: false
  script:
    - echo "DEVELOPMENT_TAG=$DEVELOPMENT_TAG" >> build.env
    - |
      if [[ "$DEVELOPMENT_TAG" == "true" ]]; then
        echo "Déploiement en environnement de développement"
        echo "Construction de l'image Docker"
        tag=$(./image_tag.sh | tr -cd '0-9.')
        docker login -u "$CI_REGISTRY_USER" -p "$CI_REGISTRY_PASSWORD" "$CI_REGISTRY"
        docker build -t $CI_REGISTRY/$CI_PROJECT_NAMESPACE/$CI_PROJECT_NAME:$tag .
        docker push  $CI_REGISTRY/$CI_PROJECT_NAMESPACE/$CI_PROJECT_NAME:$tag
        echo "Déploiement de l'image Docker"
        PORT_NUMBER=$(grep -oP 'EXPOSE\s+\K\d+' Dockerfile)
        docker rm -f dev-$CI_PROJECT_NAME || true
        docker run -d -p $PORT_NUMBER:$PORT_NUMBER --name dev-$CI_PROJECT_NAME $DOCKER_IMAGE_TAG
      else
        echo "No environment tag set for this runner development"
        exit 1
      fi

  artifacts:
    reports:
      dotenv: build.env
    paths:
      - .docker_tag
    expire_in: 1 day

######## DEPLOY ENV STAGING ########
Env_staging:
  stage: deploy
  tags:
    - gitlab-lamboft-shell-runner
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
  script:
    - echo "Déploiement en environnement de staging"
    - docker login -u "$CI_REGISTRY_USER" -p "$CI_REGISTRY_PASSWORD" "$CI_REGISTRY"
    - docker build -t $DOCKER_IMAGE_TAG .
    - docker push $DOCKER_IMAGE_TAG
    - echo "Lancement de l'image Docker pour l'environnement de staging"
    - PORT_NUMBER=$(grep -oP 'EXPOSE\s+\K\d+' Dockerfile)
    - docker rm -f staging-$CI_PROJECT_NAME || true
    - docker run -d -p $PORT_NUMBER:$PORT_NUMBER --name staging-$CI_PROJECT_NAME $DOCKER_IMAGE_TAG
  artifacts:
    reports:
      dotenv: build.env
    paths:
      - .docker_tag
    expire_in: 1 day
