######## VARIABLES ########
variables:
  GIT_DEPTH: "0" # Pour récupérer toutes les branches
  DOTNET_CLI_TELEMETRY_OPTOUT: "1" # Désactiver la télémétrie .NET
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: "true" # Réduire les étapes initiales
  DOTNET_NOLOGO: "true" # Supprimer le logo CLI .NET des logs
  BUILD_CONFIGURATION: "Release" # Configuration utilisée pour la compilation
  COVERAGE_REPORT_PATH: "TestAuthentications/coverage.opencover.xml"
  SONAR_HOST_URL: "https://your-sonarqube-url" # URL de SonarQube
  SONAR_USER_TOKEN: "${SONAR_USER_TOKEN}" # Jeton pour SonarQube
  DOCKER_IMAGE_TAG: "${CI_REGISTRY_IMAGE}:${CI_COMMIT_REF_SLUG}" # Tag de l'image Docker

default:
  tags:
  - gitlab-lamboft-docker-runner


######## CACHE ########
cache:
  key: ${CI_COMMIT_REF_SLUG}
  paths:
    - ~/.nuget/packages/ # Cache des dépendances NuGet
    - ./**/bin/ # Cache des fichiers compilés
    - ./**/obj/ # Cache des fichiers temporaires

######## STAGES ########
stages:
  - restore
  - build
  - test
  - sonarqube-check_analysis_report
  - deploy

######## RESTORE ########
restore:
  stage: restore
  script:
    - echo "Nettoyage des caches locaux NuGet"
    - dotnet nuget locals all --clear
    - echo "Restauration des dépendances .NET"
    - dotnet restore Authentifications.sln
  artifacts:
    paths:
      - ~/.nuget/packages/ # Sauvegarde le cache des dépendances
    expire_in: 1 day

######## BUILD ########
build:
  stage: build
  script:
    - echo "Compilation du projet principal"
    - dotnet build Authentifications.sln --configuration $BUILD_CONFIGURATION --no-restore
  dependencies:
    - restore # Dépend de la restauration
  artifacts:
    paths:
      - ./**/bin/
      - ./**/obj/
    expire_in: 1 day

######## TEST ########
test:
  stage: test
  script:
    - echo "Exécution des tests unitaires avec collecte de couverture"
    - |
      dotnet test TestAuthentications/TestAuthentications.csproj \
        --configuration $BUILD_CONFIGURATION \
        --no-restore \
        --collect:"XPlat Code Coverage" \
        /p:CollectCoverage=true \
        /p:CoverletOutputFormat=opencover \
        /p:CoverletOutput=${COVERAGE_REPORT_PATH}
  dependencies:
    - build # Dépend de la compilation
  artifacts:
    when: always
    paths:
      - ${COVERAGE_REPORT_PATH}
    reports:
      junit: ${COVERAGE_REPORT_PATH}

######## SONARQUBE ########
sonarqube-check_analysis_report:
  stage: sonarqube-check_analysis_report
  script:
    - echo "Lancement de l'analyse SonarQube"
    - dotnet sonarscanner begin \
        /k:"${CI_PROJECT_NAME}" \
        /d:sonar.host.url="${SONAR_HOST_URL}" \
        /d:sonar.login="${SONAR_USER_TOKEN}" \
        /d:sonar.cs.opencover.reportsPaths=${COVERAGE_REPORT_PATH}
    - dotnet build Authentifications.sln --configuration $BUILD_CONFIGURATION
    - dotnet sonarscanner end /d:sonar.login="${SONAR_USER_TOKEN}"
  dependencies:
    - test # Dépend des tests et de la couverture

######## DEPLOY ENV DEV ########
Env_dev:
  stage: deploy
  tags:
    - development
  rules:
    - if: '$CI_COMMIT_BRANCH == "develop"'
  script:
    - echo "Déploiement en environnement de développement"
    - echo "Construction de l'image Docker"
    - docker login -u "$CI_REGISTRY_USER" -p "$CI_REGISTRY_PASSWORD" "$CI_REGISTRY"
    - docker build -t $DOCKER_IMAGE_TAG .
    - docker push $DOCKER_IMAGE_TAG
    - echo "Déploiement de l'image Docker"
    - PORT_NUMBER=$(grep -oP 'EXPOSE\s+\K\d+' Dockerfile)
    - docker rm -f dev-$CI_PROJECT_NAME || true
    - docker run -d -p $PORT_NUMBER:$PORT_NUMBER --name dev-$CI_PROJECT_NAME $DOCKER_IMAGE_TAG
  artifacts:
    reports:
      dotenv: build.env
    paths:
      - .docker_tag
    expire_in: 1 day

######## DEPLOY ENV STAGING ########
Env_staging:
  stage: deploy
  tags:
    - staging
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
  script:
    - echo "Déploiement en environnement de staging"
    - docker login -u "$CI_REGISTRY_USER" -p "$CI_REGISTRY_PASSWORD" "$CI_REGISTRY"
    - docker build -t $DOCKER_IMAGE_TAG .
    - docker push $DOCKER_IMAGE_TAG
    - echo "Lancement de l'image Docker pour l'environnement de staging"
    - PORT_NUMBER=$(grep -oP 'EXPOSE\s+\K\d+' Dockerfile)
    - docker rm -f staging-$CI_PROJECT_NAME || true
    - docker run -d -p $PORT_NUMBER:$PORT_NUMBER --name staging-$CI_PROJECT_NAME $DOCKER_IMAGE_TAG
  artifacts:
    reports:
      dotenv: build.env
    paths:
      - .docker_tag
    expire_in: 1 day


